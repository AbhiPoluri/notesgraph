<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #1a1a1a; --surface: #242424; --border: #333;
  --text: #e8e8e8; --muted: #888; --accent: #7c6af7;
  --accent2: #4ecdc4; --danger: #e74c3c; --sidebar-w: 260px;
}
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100dvh; display: flex; overflow: hidden; }

/* ── Sidebar ── */
#sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
#search-bar { padding: 12px; border-bottom: 1px solid var(--border); }
#search-bar input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 10px; border-radius: 6px; font-size: 13px; outline: none; }
#search-bar input:focus { border-color: var(--accent); }
#note-list { flex: 1; overflow-y: auto; }
.note-item { padding: 12px 14px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; position: relative; }
.note-del-btn { position: absolute; top: 6px; right: 6px; background: transparent; border: none; color: transparent; cursor: pointer; font-size: 14px; padding: 2px 5px; border-radius: 3px; line-height: 1; transition: color 0.1s, background 0.1s; }
.note-item:hover .note-del-btn { color: var(--muted); }
.note-del-btn:hover { color: var(--danger) !important; background: rgba(231,76,60,0.12); }
.note-item:hover, .note-item.active { background: #2e2e2e; }
.note-item.active { border-left: 3px solid var(--accent2); padding-left: 11px; }
.note-item h4 { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.note-item .meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
.note-item .preview { font-size: 11px; color: var(--muted); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tag { display: inline-block; background: #333; color: var(--accent); font-size: 10px; padding: 1px 5px; border-radius: 3px; margin-right: 3px; }
.mem-item { padding: 11px 14px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; min-height: 44px; }
.mem-item:hover, .mem-item.active { background: #2e2e2e; }
.mem-item.active { border-left: 3px solid #f5a623; padding-left: 11px; }
.mem-item .mem-text { font-size: 12px; color: var(--text); overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.5; }
.mem-item .mem-meta { font-size: 10px; color: var(--muted); margin-top: 4px; display: flex; gap: 6px; }
.mem-cat { color: #f5a623; }
#new-note-btn { margin: 12px; padding: 9px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }
#new-note-btn:hover { opacity: 0.85; }

/* ── Main ── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#toolbar { display: flex; align-items: center; gap: 8px; padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--surface); }
#note-title-input { flex: 1; background: transparent; border: none; color: var(--text); font-size: 16px; font-weight: 600; outline: none; }
.btn { padding: 6px 12px; border-radius: 5px; border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; font-size: 12px; }
.btn:hover { background: #333; }
.btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
.btn.danger { border-color: var(--danger); color: var(--danger); }
.btn.active { background: #333; }
#tags-input { background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 11px; padding: 4px 8px; border-radius: 4px; outline: none; width: 120px; }

#content-area { flex: 1; overflow: hidden; position: relative; }
#editor { width: 100%; height: 100%; background: var(--bg); color: var(--text); border: none; outline: none; font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace; font-size: 14px; line-height: 1.7; padding: 24px 32px; display: none; overflow-y: auto; white-space: pre-wrap; word-break: break-word; box-sizing: border-box; }
#editor:empty:before { content: attr(data-placeholder); color: var(--muted); pointer-events: none; }
#editor .editor-img { max-width: min(480px, 90%); max-height: 360px; border-radius: 6px; display: block; margin: 4px 0; cursor: default; vertical-align: middle; }
#preview { height: 100%; overflow-y: auto; padding: 24px 32px; display: none; }
#preview h1, #preview h2, #preview h3 { margin: 1em 0 0.4em; }
#preview p { margin: 0.6em 0; line-height: 1.7; }
#preview code { background: #2d2d2d; padding: 1px 5px; border-radius: 3px; font-size: 13px; }
#preview pre { background: #2d2d2d; padding: 16px; border-radius: 6px; overflow-x: auto; margin: 1em 0; }
#preview a { color: var(--accent); }
#preview a.wikilink { color: var(--accent2); text-decoration: none; border-bottom: 1px dashed var(--accent2); }
#preview ul, #preview ol { margin: 0.6em 0 0.6em 1.5em; }
#preview blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--muted); margin: 1em 0; }
#preview table { border-collapse: collapse; width: 100%; margin: 1em 0; }
#preview th, #preview td { border: 1px solid var(--border); padding: 8px 12px; }
#preview th { background: var(--surface); }
#preview img { max-width: 100%; border-radius: 6px; margin: 0.5em 0; display: block; }
#empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--muted); gap: 12px; }
#empty-state h2 { font-size: 18px; color: var(--text); }

/* ── Graph ── */
#graph-container { width: 100%; height: 100%; display: none; }
svg { width: 100%; height: 100%; user-select: none; -webkit-user-select: none; cursor: default; }
.node { cursor: pointer; }
.node circle { stroke-width: 1.5px; cursor: pointer; transition: r 0.2s; }
.node circle:hover { r: 10; }
.node text { font-size: 11px; fill: var(--text); pointer-events: none; cursor: pointer; }
.link { stroke-opacity: 0.4; }
.link.type-link { stroke: var(--accent); }
.link.type-similar { stroke: var(--accent2); stroke-dasharray: 4 2; }
.link.type-memory-similar { stroke: #f5a623; stroke-dasharray: 3 3; }
#graph-legend { position: absolute; bottom: 16px; left: 16px; background: rgba(0,0,0,0.7); padding: 10px 14px; border-radius: 6px; font-size: 11px; display: none; }
.legend-item { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.legend-line { width: 20px; height: 2px; }

/* ── Nav tabs ── */
#view-tabs { display: flex; gap: 4px; }
.tab-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
.tab-btn.active { background: var(--surface); color: var(--text); }

/* ── Upload drop zone ── */

#upload-toast { position:fixed; bottom:24px; right:24px; background:var(--surface); border:1px solid var(--border); padding:10px 16px; border-radius:6px; font-size:13px; z-index:300; display:none; }

/* ── Uploads page ── */
#uploads-view { display:none; height:100%; overflow-y:auto; padding:32px; display:none; flex-direction:column; gap:24px; }
#uploads-drop-zone { border:2px dashed var(--border); border-radius:12px; padding:48px 32px; text-align:center; cursor:pointer; transition:border-color 0.15s,background 0.15s; }
#uploads-drop-zone:hover, #uploads-drop-zone.over { border-color:var(--accent); background:rgba(124,106,247,0.05); }
#uploads-drop-zone .drop-icon { font-size:40px; margin-bottom:12px; }
#uploads-drop-zone .drop-title { font-size:16px; font-weight:600; color:var(--text); margin-bottom:6px; }
#uploads-drop-zone .drop-sub { font-size:12px; color:var(--muted); }
#uploads-result { font-size:12px; color:var(--muted); padding:10px 0; min-height:24px; }
#uploads-gallery { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px; }
.upload-thumb { background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow:hidden; cursor:pointer; transition:border-color 0.15s; }
.upload-thumb:hover { border-color:var(--accent); }
.upload-thumb img { width:100%; height:100px; object-fit:cover; display:block; }
.upload-thumb .thumb-name { font-size:10px; color:var(--muted); padding:6px 8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.upload-file { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:10px 12px; cursor:pointer; transition:border-color 0.15s; display:flex; align-items:center; gap:8px; }
.upload-file:hover { border-color:var(--accent); }
.upload-file .file-icon { font-size:20px; }
.upload-file .file-info { min-width:0; }
.upload-file .file-name { font-size:12px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.upload-file .file-size { font-size:10px; color:var(--muted); margin-top:2px; }
#uploads-section-title { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-top:8px; }

/* ── Format bar ── */
.fmt-btn { background:transparent; border:1px solid transparent; color:var(--muted); padding:3px 7px; border-radius:4px; cursor:pointer; font-size:11px; font-family:inherit; white-space:nowrap; }
.fmt-btn:hover { background:#333; color:var(--text); border-color:var(--border); }
.fmt-btn.active { background:#2a2a40; color:var(--accent); border-color:var(--accent); }

/* ── Interactive table ── */
.fmt-table { border-collapse:collapse; width:100%; margin:0.5em 0; }
.fmt-table th[contenteditable], .fmt-table td[contenteditable] { border:1px solid var(--border); padding:6px 10px; min-width:60px; }
.fmt-table th[contenteditable] { background:var(--surface); text-align:left; }
.fmt-table .tbl-ctrl-cell, .fmt-table .tbl-ctrl-row td { border:none !important; background:transparent !important; padding:2px; vertical-align:middle; }
.fmt-table .tbl-ctrl-row td { text-align:center; }
.tbl-btn { background:transparent; border:1px solid var(--border); color:var(--muted); width:20px; height:20px; border-radius:3px; cursor:pointer; font-size:13px; line-height:1; padding:0; display:inline-flex; align-items:center; justify-content:center; }
.tbl-btn:hover { background:#2a2a40; color:var(--accent); border-color:var(--accent); }
.tbl-rm-btn:hover { background:rgba(231,76,60,0.08); color:var(--danger); border-color:var(--danger); }
.tbl-rm-col-btn { float:right; margin-left:4px; margin-top:1px; }

/* ── Word count ── */
#word-count { font-size: 11px; color: var(--muted); white-space: nowrap; }

/* ── Split view ── */
#content-area.split { display: flex; }
#content-area.split #editor { display: block !important; width: 50%; border-right: 1px solid var(--border); }
#content-area.split #split-pane { display: flex !important; flex-direction: column; width: 50%; }
#split-pane { display: none; height: 100%; overflow-y: auto; background: var(--bg); }
#split-pane-header { padding: 12px 24px; border-bottom: 1px solid var(--border); background: var(--surface); font-size: 13px; font-weight: 600; color: var(--text); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
#split-pane-header .split-note-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#split-pane-header .split-hint { font-size: 11px; color: var(--muted); font-weight: 400; white-space: nowrap; }
#split-pane-content { padding: 24px 32px; overflow-y: auto; flex: 1; }
#split-pane-content h1, #split-pane-content h2, #split-pane-content h3 { margin: 1em 0 0.4em; }
#split-pane-content p { margin: 0.6em 0; line-height: 1.7; }
#split-pane-content code { background: #2d2d2d; padding: 1px 5px; border-radius: 3px; font-size: 13px; }
#split-pane-content pre { background: #2d2d2d; padding: 16px; border-radius: 6px; overflow-x: auto; margin: 1em 0; }
#split-pane-content a { color: var(--accent); }
#split-pane-content a.wikilink { color: var(--accent2); text-decoration: none; border-bottom: 1px dashed var(--accent2); }
#split-pane-content ul, #split-pane-content ol { margin: 0.6em 0 0.6em 1.5em; }
#split-pane-content blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--muted); margin: 1em 0; }
#split-pane-content table { border-collapse: collapse; width: 100%; margin: 1em 0; }
#split-pane-content th, #split-pane-content td { border: 1px solid var(--border); padding: 8px 12px; }
#split-pane-content th { background: var(--surface); }
#split-pane-content img { max-width: 100%; border-radius: 6px; margin: 0.5em 0; display: block; }
.note-split-btn { position: absolute; top: 6px; right: 28px; background: transparent; border: none; color: transparent; cursor: pointer; font-size: 11px; padding: 2px 4px; border-radius: 3px; line-height: 1; transition: color 0.1s; }
.note-item:hover .note-split-btn { color: var(--muted); }
.note-split-btn:hover { color: var(--accent) !important; }

/* ── Focus mode ── */
body.focus #sidebar { display: none; }
body.focus #toolbar { display: none; }
body.focus #editor { padding: 48px 20%; }
body.focus #preview { padding: 48px 20%; }

/* ── Command palette ── */
#cmd-palette { display:none; position:fixed; inset:0; z-index:400; background:rgba(0,0,0,0.6); align-items:flex-start; justify-content:center; padding-top:15vh; }
#cmd-palette.open { display:flex; }
#cmd-palette-box { background:var(--surface); border:1px solid var(--border); border-radius:10px; width:520px; max-width:90vw; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,0.6); }
#cmd-input { width:100%; background:transparent; border:none; border-bottom:1px solid var(--border); color:var(--text); font-size:15px; padding:14px 16px; outline:none; }
#cmd-results { max-height:320px; overflow-y:auto; }
.cmd-item { padding:10px 16px; cursor:pointer; font-size:13px; display:flex; flex-direction:column; gap:2px; }
.cmd-item:hover, .cmd-item.selected { background:#2e2e2e; }
.cmd-item .cmd-title { font-weight:500; }
.cmd-item .cmd-preview { font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* ── Sidebar tabs ── */
#sidebar-tabs { display:flex; border-bottom:1px solid var(--border); }
.sidebar-tab { flex:1; padding:9px 0; text-align:center; font-size:12px; font-weight:500; cursor:pointer; color:var(--muted); background:transparent; border:none; border-bottom:2px solid transparent; transition:color 0.15s,border-color 0.15s; }
.sidebar-tab.active { color:var(--text); border-bottom-color:var(--accent); }
.sidebar-tab:hover:not(.active) { color:var(--text); }

/* ── Uploads panel ── */
#uploads-panel { border-top:1px solid var(--border); }
#uploads-toggle { width:100%; background:transparent; border:none; color:var(--muted); padding:10px 14px; text-align:left; cursor:pointer; font-size:12px; display:flex; align-items:center; gap:6px; }
#uploads-toggle:hover { color:var(--text); }
#uploads-toggle .arrow { margin-left:auto; transition:transform 0.2s; }
#uploads-toggle.open .arrow { transform:rotate(90deg); }
#uploads-body { display:none; padding:0 14px 12px; }
#uploads-toggle.open + #uploads-body { display:block; }
#zip-drop { border:2px dashed var(--border); border-radius:6px; padding:14px; text-align:center; font-size:12px; color:var(--muted); cursor:pointer; transition:border-color 0.15s,color 0.15s; }
#zip-drop:hover, #zip-drop.over { border-color:var(--accent); color:var(--accent); }
#zip-results { margin-top:8px; font-size:11px; color:var(--muted); max-height:80px; overflow-y:auto; line-height:1.6; }

/* ── LAN footer ── */
#lan-footer { padding:10px 14px; border-top:1px solid var(--border); font-size:11px; color:var(--muted); display:flex; flex-direction:column; gap:6px; }
#lan-footer a { color:var(--accent2); text-decoration:none; }
#wifi-toggle-row { display:flex; align-items:center; gap:8px; }
#wifi-toggle { position:relative; width:32px; height:18px; background:#444; border-radius:9px; border:none; cursor:pointer; transition:background 0.2s; padding:0; flex-shrink:0; }
#wifi-toggle.on { background:var(--accent2); }
#wifi-toggle::after { content:''; position:absolute; top:2px; left:2px; width:14px; height:14px; background:#fff; border-radius:50%; transition:left 0.2s; }
#wifi-toggle.on::after { left:16px; }
#wifi-label { font-size:11px; color:var(--muted); }
#wifi-url { font-size:11px; }

/* ── Mobile ── */
#sidebar-toggle { display: none; background: transparent; border: none; color: var(--text); font-size: 20px; cursor: pointer; padding: 0 8px; min-width: 44px; min-height: 44px; }
.note-item { min-height: 44px; }
svg { touch-action: none; }
@media (max-width: 640px) {
  #sidebar { position: absolute; left: -100%; z-index: 100; height: 100%; transition: left 0.2s; width: 80vw; }
  #sidebar.open { left: 0; box-shadow: 4px 0 20px rgba(0,0,0,0.5); }
  #sidebar-toggle { display: flex; align-items: center; justify-content: center; }
  #toolbar { flex-wrap: wrap; padding: 8px 10px; gap: 6px; }
  #note-title-input { min-width: 0; font-size: 15px; }
  #tags-input { width: auto; flex: 1; min-width: 0; font-size: 12px; }
  #view-tabs { order: 3; width: 100%; display: flex; }
  #view-tabs .tab-btn { flex: 1; text-align: center; padding: 8px 4px; min-height: 36px; }
  #editor, #preview { padding: 16px; }
  .btn { padding: 8px 10px; min-height: 36px; }
  #save-btn { font-size: 13px; }
}
</style>
</head>
<body>

<div id="upload-toast"></div>

<div id="cmd-palette">
  <div id="cmd-palette-box">
    <input id="cmd-input" placeholder="Go to note..." oninput="cmdFilter(this.value)" autocomplete="off">
    <div id="cmd-results"></div>
  </div>
</div>

<div id="sidebar">
  <div style="padding:10px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px;">
    <span style="font-size:13px;font-weight:600;color:var(--text);flex:1;">notesgraph</span>
    <button id="new-note-btn" onclick="newNote()" style="font-size:11px;padding:5px 9px;">+ Note</button>
  </div>
  <div id="sidebar-tabs">
    <button class="sidebar-tab active" id="stab-notes" onclick="setSidebarTab('notes')">Notes</button>
    <button class="sidebar-tab" id="stab-memories" onclick="setSidebarTab('memories')">Memories</button>
  </div>
  <div id="search-bar">
    <input type="text" placeholder="Search notes..." id="search-input" oninput="onSearch(this.value)">
  </div>
  <div id="note-list" style="flex:1;overflow-y:auto;"></div>
  <div id="memory-list" style="flex:1;overflow-y:auto;display:none;"></div>
  <div id="memory-panel" style="display:none; flex-direction:column; border-top:1px solid var(--border); max-height:55%; overflow-y:auto; padding:14px 14px 16px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <div id="memory-category" style="font-size:10px;color:var(--accent);background:#2a2a40;padding:2px 7px;border-radius:3px;display:inline-block;"></div>
      <button onclick="closeMemory()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:0 2px;line-height:1;">×</button>
    </div>
    <div id="memory-text" style="font-size:13px;line-height:1.6;color:var(--text);white-space:pre-wrap;flex:1;"></div>
    <div id="memory-date" style="font-size:11px;color:var(--muted);margin-top:10px;"></div>
  </div>
  <div id="lan-footer"></div>
</div>

<div id="main">
  <div id="toolbar">
    <button id="sidebar-toggle" onclick="toggleSidebar()">☰</button>
    <input id="note-title-input" placeholder="Note title..." oninput="markDirty()">
    <input id="tags-input" placeholder="tags, comma separated" oninput="markDirty()">
    <div id="view-tabs">
      <button class="tab-btn" onclick="setView('edit')" id="tab-edit">Edit</button>
      <button class="tab-btn" onclick="setView('preview')" id="tab-preview">Preview</button>
      <button class="tab-btn active" onclick="setView('graph')" id="tab-graph">Graph</button>
      <button class="tab-btn" onclick="setView('uploads')" id="tab-uploads">Uploads</button>
    </div>
    <input type="file" id="uploads-file-input" style="display:none" multiple onchange="handleUploadsFileSelect(this)">
    <button class="btn primary" id="save-btn" onclick="saveNote()" style="display:none">Save</button>
    <button class="btn" id="export-btn" title="Export note as .md" onclick="exportNote()" style="display:none">↓</button>
    <button class="btn" id="split-btn" title="Split view (edit + preview)" onclick="toggleSplit()" style="display:none">⊟</button>
    <button class="btn" id="focus-btn" title="Focus mode (F)" onclick="toggleFocus()">⛶</button>
    <span id="word-count"></span>
  </div>

  <div id="format-bar" style="display:none; align-items:center; gap:2px; padding:4px 12px; border-bottom:1px solid var(--border); background:var(--surface); flex-wrap:wrap;">
    <button class="fmt-btn" data-fmt="bold" onclick="fmtWrap('**','**')" title="Bold (Cmd+B)"><b>B</b></button>
    <button class="fmt-btn" data-fmt="italic" onclick="fmtWrap('*','*')" title="Italic (Cmd+I)"><i>I</i></button>
    <button class="fmt-btn" data-fmt="strike" onclick="fmtWrap('~~','~~')" title="Strikethrough"><s>S</s></button>
    <button class="fmt-btn" data-fmt="code" onclick="fmtWrap('`','`')" title="Inline code"><code style="font-size:11px">cd</code></button>
    <div style="width:1px;height:16px;background:var(--border);margin:0 4px;"></div>
    <button class="fmt-btn" onclick="fmtLine('# ')" title="Heading 1">H1</button>
    <button class="fmt-btn" onclick="fmtLine('## ')" title="Heading 2">H2</button>
    <button class="fmt-btn" onclick="fmtLine('### ')" title="Heading 3">H3</button>
    <div style="width:1px;height:16px;background:var(--border);margin:0 4px;"></div>
    <button class="fmt-btn" onclick="fmtLine('- ')" title="Bullet list">• List</button>
    <button class="fmt-btn" onclick="fmtLine('1. ')" title="Numbered list">1. List</button>
    <button class="fmt-btn" onclick="fmtLine('- [ ] ')" title="Checklist">☐ Check</button>
    <button class="fmt-btn" onclick="fmtLine('> ')" title="Blockquote">" Quote</button>
    <div style="width:1px;height:16px;background:var(--border);margin:0 4px;"></div>
    <button class="fmt-btn" onclick="fmtInsertTable()" title="Insert table">Table</button>
    <button class="fmt-btn" onclick="fmtInsertCodeBlock()" title="Code block">``` Block</button>
    <button class="fmt-btn" onclick="fmtInsert('\n---\n')" title="Divider">— HR</button>
    <button class="fmt-btn" onclick="fmtInsertLink()" title="Link">Link</button>
    <div style="width:1px;height:16px;background:var(--border);margin:0 4px;"></div>
    <button class="fmt-btn" id="fmt-live-btn" onclick="toggleLivePreview()" title="Live preview while typing">Live</button>
  </div>

  <div id="content-area">
    <div id="empty-state">
      <h2>Notes</h2>
      <p>Select a note or create a new one</p>
      <button class="btn primary" onclick="newNote()">+ New Note</button>
    </div>
    <div id="editor" contenteditable="true" spellcheck="false" data-placeholder="Write in markdown... Use [[Note Title]] to link notes." oninput="markDirty()"></div>
    <div id="preview"></div>
    <div id="split-pane">
      <div id="split-pane-header">
        <span class="split-note-title" id="split-pane-title">Click ⊞ on a note to view it here</span>
        <span class="split-hint">split view</span>
      </div>
      <div id="split-pane-content"></div>
    </div>
    <div id="uploads-view" style="display:none;height:100%;overflow-y:auto;padding:32px;flex-direction:column;gap:24px;">
      <div id="uploads-drop-zone"
           onclick="document.getElementById('uploads-file-input').click()"
           ondragover="event.preventDefault();this.classList.add('over')"
           ondragleave="this.classList.remove('over')"
           ondrop="handleUploadsDrop(event)">
        <div class="drop-icon">↑</div>
        <div class="drop-title">Drop files here</div>
        <div class="drop-sub">Images, text files, or .zip folders — anything</div>
      </div>
      <div id="uploads-result"></div>
      <div id="uploads-files-section" style="display:none">
        <div id="uploads-section-title">Uploaded Files</div>
        <div id="uploads-gallery" style="margin-top:12px;"></div>
      </div>
    </div>
    <div id="graph-container">
      <svg id="graph-svg"></svg>
      <div id="graph-legend">
        <div class="legend-item"><div class="legend-line" style="background:var(--accent)"></div> Wikilink</div>
        <div class="legend-item"><div class="legend-line" style="background:var(--accent2); border-top: 2px dashed var(--accent2); height:0"></div> Semantic</div>
        <div class="legend-item"><div class="legend-line" style="background:#f5a623; border-top: 2px dashed #f5a623; height:0"></div> Memory link</div>
        <div class="legend-item"><div style="width:10px;height:10px;border-radius:50%;background:#f5a623;display:inline-block"></div> Memory</div>
      </div>
    </div>
  </div>
</div>

<script>
marked.use({ gfm: true, breaks: false });

let notes = [];
let livePreviewActive = false;
let memories = [];
let activeNote = null;
let activeMemoryId = null;
let dirty = false;
let currentView = 'graph';
let graphSimulation = null;
let sidebarTab = 'notes';
let splitNoteId = null;

// ── Editor helpers (contenteditable ↔ markdown) ──────────────────────────

function mdToHtml(text) {
  // Extract image markdown, escape the rest, restore images as <img>
  const imgs = [];
  const tokenized = (text || '').replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (full, alt, src) => {
    imgs.push({ full, alt, src });
    return `\x01${imgs.length - 1}\x01`;
  });
  const lines = tokenized.split('\n');
  const htmlLines = lines.map(line =>
    line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/\x01(\d+)\x01/g, (_, i) => {
          const { full, alt, src } = imgs[+i];
          return `<img src="${src}" alt="${alt.replace(/"/g,'&quot;')}" data-md="${full.replace(/"/g,'&quot;')}" class="editor-img">`;
        })
  );
  return htmlLines.join('<br>');
}

function htmlToMd(el) {
  let md = '';
  function walk(node) {
    if (node.nodeType === 3) {
      md += node.textContent;
    } else if (node.tagName === 'IMG') {
      md += node.getAttribute('data-md') || `![${node.alt||''}](${node.getAttribute('src')||''})`;
    } else if (node.tagName === 'BR') {
      md += '\n';
    } else if (node.tagName === 'DIV' || node.tagName === 'P') {
      if (md && !md.endsWith('\n')) md += '\n';
      for (const c of node.childNodes) walk(c);
    } else {
      for (const c of node.childNodes) walk(c);
    }
  }
  for (const c of el.childNodes) walk(c);
  return md.replace(/\n$/, '');
}

function getContent() {
  if (livePreviewActive) return richHtmlToMd(document.getElementById('preview'));
  return htmlToMd(document.getElementById('editor'));
}
function setContent(text) { document.getElementById('editor').innerHTML = mdToHtml(text); }

// ── Init ─────────────────────────────────────────────────────────────────

async function init() {
  await Promise.all([loadNotes(), loadMemoryList()]);
  if (location.hash) {
    const id = parseInt(location.hash.slice(1));
    const note = notes.find(n => n.id === id);
    if (note) { await openNote(note.id); return; }
  }
  setView('graph');
}

async function loadNotes(query = '') {
  const url = query ? `/api/search?q=${encodeURIComponent(query)}` : '/api/notes';
  const res = await fetch(url);
  notes = await res.json();
  renderNoteList(query);
}

function renderNoteList(query = '') {
  const list = document.getElementById('note-list');
  const filtered = query
    ? notes.filter(n => n.title.toLowerCase().includes(query.toLowerCase()) || (n.preview||'').toLowerCase().includes(query.toLowerCase()) || (n.tags||'').toLowerCase().includes(query.toLowerCase()))
    : notes;
  if (!filtered.length) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">' + (query ? 'No results' : 'No notes yet') + '</div>';
    return;
  }
  list.innerHTML = filtered.map(n => `
    <div class="note-item ${activeNote?.id === n.id ? 'active' : ''}" onclick="openNote(${n.id})">
      <button class="note-del-btn" onclick="deleteNoteById(${n.id},event)" title="Delete note">✕</button>
      <button class="note-split-btn" onclick="openNoteInSplit(${n.id},event)" title="Open in split view">⊞</button>
      <h4>${esc(n.title)}</h4>
      <div class="meta">${formatDate(n.updated_at)}${n.tags ? ' · ' + n.tags.split(',').map(t=>`<span class="tag">${esc(t.trim())}</span>`).join('') : ''}</div>
      ${n.preview ? `<div class="preview">${esc(n.preview)}</div>` : ''}
    </div>
  `).join('');
}

function setSidebarTab(tab) {
  sidebarTab = tab;
  document.getElementById('stab-notes').classList.toggle('active', tab === 'notes');
  document.getElementById('stab-memories').classList.toggle('active', tab === 'memories');
  document.getElementById('note-list').style.display = tab === 'notes' ? '' : 'none';
  document.getElementById('memory-list').style.display = tab === 'memories' ? '' : 'none';
  document.getElementById('search-input').placeholder = tab === 'notes' ? 'Search notes...' : 'Search memories...';
  document.getElementById('search-input').value = '';
}

async function loadMemoryList(query = '') {
  const res = await fetch('/api/memories');
  if (!res.ok) return;
  memories = await res.json();
  renderMemoryList(query);
}

function renderMemoryList(query = '') {
  const list = document.getElementById('memory-list');
  const filtered = query
    ? memories.filter(m => m.text.toLowerCase().includes(query.toLowerCase()) || (m.category||'').toLowerCase().includes(query.toLowerCase()))
    : memories;
  if (!filtered.length) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">No memories found</div>';
    return;
  }
  list.innerHTML = filtered.map(m => `
    <div class="mem-item ${activeMemoryId === m.id ? 'active' : ''}" onclick="openMemory(${JSON.stringify(m).replace(/"/g,'&quot;')})">
      <div class="mem-text">${esc(m.text)}</div>
      <div class="mem-meta"><span class="mem-cat">${esc(m.category||'general')}</span><span>${formatDate(m.created_at)}</span></div>
    </div>
  `).join('');
}

// ── Note CRUD ─────────────────────────────────────────────────────────────

async function openNote(id) {
  if (dirty && activeNote && !confirm('Unsaved changes. Discard?')) return;
  // Close sidebar on mobile when opening a note
  const sidebar = document.getElementById('sidebar');
  if (sidebar.classList.contains('open')) toggleSidebar();
  const res = await fetch(`/api/notes/${id}`);
  activeNote = await res.json();
  dirty = false;
  document.getElementById('note-title-input').value = activeNote.title;
  document.getElementById('tags-input').value = activeNote.tags || '';
  setContent(activeNote.content || '');
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('save-btn').style.display = '';

  document.getElementById('export-btn').style.display = '';
  document.getElementById('split-btn').style.display = '';
  location.hash = id;
  const targetView = currentView === 'graph' ? 'edit' : currentView;
  setView(targetView);
  renderNoteList();
  if (currentView === 'preview') renderPreview();
}

function newNote() {
  if (dirty && activeNote && !confirm('Unsaved changes. Discard?')) return;
  activeNote = null;
  dirty = false;
  document.getElementById('note-title-input').value = '';
  document.getElementById('tags-input').value = '';
  setContent('');
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('save-btn').style.display = '';

  document.getElementById('export-btn').style.display = '';
  document.getElementById('split-btn').style.display = '';
  setView('edit');
  document.getElementById('note-title-input').focus();
}

let saving = false;

async function saveNote() {
  if (saving) return;
  saving = true;
  clearTimeout(autoSaveTimer);  // prevent auto-save firing mid-save

  const btn = document.getElementById('save-btn');
  btn.textContent = 'Saving…';
  btn.disabled = true;

  const title = document.getElementById('note-title-input').value.trim() || 'Untitled';
  const content = getContent();
  const tags = document.getElementById('tags-input').value.trim();
  const body = { title, content, tags };

  try {
    if (activeNote) {
      const res = await fetch(`/api/notes/${activeNote.id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
      activeNote = await res.json();
    } else {
      const res = await fetch('/api/notes', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
      activeNote = await res.json();
      location.hash = activeNote.id;
        }
    dirty = false;
    btn.classList.remove('primary');
    btn.textContent = 'Saved ✓';
    setTimeout(() => { btn.classList.add('primary'); btn.textContent = 'Save'; btn.disabled = false; }, 1500);
    await loadNotes();
    if (currentView === 'preview') renderPreview();
  } catch (e) {
    btn.textContent = 'Error';
    btn.disabled = false;
    setTimeout(() => { btn.classList.add('primary'); btn.textContent = 'Save'; }, 2000);
  } finally {
    saving = false;
  }
}


async function deleteNoteById(id, e, skipConfirm) {
  e.stopPropagation();
  if (!skipConfirm && !confirm('Delete this note?')) return;
  await fetch(`/api/notes/${id}`, { method: 'DELETE' });
  if (activeNote?.id === id) {
    activeNote = null;
    dirty = false;
    document.getElementById('empty-state').style.display = '';
    document.getElementById('editor').style.display = 'none';
    document.getElementById('preview').style.display = 'none';
    document.getElementById('graph-container').style.display = 'none';
    document.getElementById('graph-legend').style.display = 'none';
    document.getElementById('save-btn').style.display = 'none';
      document.getElementById('export-btn').style.display = 'none';
    document.getElementById('split-btn').style.display = 'none';
    location.hash = '';
  }
  await loadNotes();
}

let autoSaveTimer = null;

function markDirty() {
  dirty = true;
  const btn = document.getElementById('save-btn');
  btn.classList.add('primary');
  btn.textContent = 'Save';
  updateWordCount();
  // Auto-save 3s after last keystroke
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => { if (dirty) saveNote(); }, 3000);
}

function updateWordCount() {
  const text = getContent();
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  const chars = text.length;
  const wc = document.getElementById('word-count');
  if (wc) wc.textContent = words ? `${words}w · ${chars}c` : '';
}

// ── Views ─────────────────────────────────────────────────────────────────

function setView(view) {
  // Switching tabs always exits split mode
  if (splitActive) {
    splitActive = false;
    splitNoteId = null;
    document.getElementById('content-area').classList.remove('split');
    document.getElementById('split-btn').classList.remove('active');
  }
  currentView = view;
  const hasNote = activeNote !== null || document.getElementById('save-btn').style.display !== 'none';
  // Graph and Preview are always accessible; Edit shows empty-state when no note active
  if (view === 'graph' || view === 'preview') {
    document.getElementById('empty-state').style.display = 'none';
  } else if (view === 'edit' && !hasNote) {
    document.getElementById('empty-state').style.display = '';
  }
  const fmtBar = document.getElementById('format-bar');
  if (fmtBar) fmtBar.style.display = (view === 'edit' && hasNote) ? 'flex' : 'none';
  document.getElementById('editor').style.display = (view === 'edit' && hasNote) ? 'block' : 'none';
  document.getElementById('preview').style.display = view === 'preview' ? 'block' : 'none';
  document.getElementById('graph-container').style.display = view === 'graph' ? 'block' : 'none';
  document.getElementById('graph-legend').style.display = view === 'graph' ? 'block' : 'none';
  const uploadsView = document.getElementById('uploads-view');
  if (uploadsView) uploadsView.style.display = view === 'uploads' ? 'flex' : 'none';
  ['edit','preview','graph','uploads'].forEach(v => document.getElementById('tab-'+v)?.classList.toggle('active', v === view));
  if (view === 'preview') renderPreview();
  if (view === 'graph') renderGraph();
  if (view === 'uploads') loadUploadsGallery();
  // Turn off live preview when switching away from edit
  if (view !== 'edit' && livePreviewActive) {
    livePreviewActive = false;
    document.getElementById('fmt-live-btn')?.classList.remove('active');
    document.getElementById('content-area')?.classList.remove('split');
  }
}

function renderPreview() {
  const content = getContent();
  // Process wikilinks before markdown
  const processed = content.replace(/\[\[([^\]]+)\]\]/g, (_, title) => {
    const note = notes.find(n => n.title.toLowerCase() === title.toLowerCase());
    return note ? `<a class="wikilink" href="#${note.id}" onclick="openNote(${note.id});return false;">${title}</a>` : `<span style="color:var(--danger)">[[${title}]]</span>`;
  });
  document.getElementById('preview').innerHTML = marked.parse(processed);
}

// ── Graph ─────────────────────────────────────────────────────────────────

async function renderGraph() {
  const [graphRes, memRes, memEdgeRes] = await Promise.all([
    fetch('/api/graph'),
    fetch('/api/memories'),
    fetch('/api/memory-edges')
  ]);
  const data = await graphRes.json();
  const memories = memRes.ok ? await memRes.json() : [];
  const memEdges = memEdgeRes.ok ? await memEdgeRes.json() : [];
  const allEdges = [...data.edges, ...memEdges];

  // Merge memories as nodes with a 'memory' type prefix so IDs don't clash
  const memNodes = memories.map(m => ({ id: `m${m.id}`, title: m.text.slice(0, 40), type: 'memory', category: m.category, text: m.text, created_at: m.created_at }));
  const allNodes = [...data.nodes.map(n => ({...n, type: 'note'})), ...memNodes];

  const svg = d3.select('#graph-svg');
  svg.selectAll('*').remove();

  const container = document.getElementById('graph-container');
  const W = container.clientWidth, H = container.clientHeight;
  const g = svg.append('g');

  // Zoom
  svg.call(d3.zoom().scaleExtent([0.2, 4]).on('zoom', e => g.attr('transform', e.transform)));

  // Color scale by tags
  const tagSet = [...new Set(data.nodes.flatMap(n => n.tags ? n.tags.split(',').map(t => t.trim()) : []))];
  const color = d3.scaleOrdinal(d3.schemeTableau10).domain(tagSet);
  const nodeColor = n => {
    if (n.type === 'memory') return '#f5a623';
    const tags = n.tags ? n.tags.split(',').map(t => t.trim()).filter(Boolean) : [];
    return tags.length ? color(tags[0]) : '#7c6af7';
  };

  // Links
  const link = g.append('g').selectAll('line').data(allEdges).enter().append('line')
    .attr('class', d => `link type-${d.type}`)
    .attr('stroke-width', d => d.type === 'link' ? 2 : 1);

  // Nodes
  const node = g.append('g').selectAll('.node').data(allNodes).enter().append('g')
    .attr('class', 'node')
    .call(d3.drag().on('start', dragStart).on('drag', dragged).on('end', dragEnd));

  node.append('circle')
    .attr('r', d => d.type === 'memory' ? 5 : 8)
    .attr('fill', nodeColor)
    .attr('stroke', d => activeNote?.id === d.id ? '#fff' : 'rgba(255,255,255,0.2)')
    .attr('stroke-dasharray', d => d.type === 'memory' ? '3 2' : null)
    .on('click', (e, d) => {
      e.stopPropagation();
      if (d.type === 'note') { openNote(d.id); setView('edit'); }
      else if (d.type === 'memory') { openMemory(d); }
    });

  node.append('text').attr('dx', d => d.type === 'memory' ? 8 : 12).attr('dy', 4)
    .attr('fill', d => d.type === 'memory' ? '#f5a623' : 'var(--text)')
    .text(d => d.title.length > 20 ? d.title.slice(0,18)+'…' : d.title);

  if (graphSimulation) graphSimulation.stop();
  graphSimulation = d3.forceSimulation(allNodes)
    .force('link', d3.forceLink(allEdges).id(d => d.id).distance(d => d.type === 'link' ? 80 : 140).strength(d => d.type === 'link' ? 0.8 : 0.3))
    .force('charge', d3.forceManyBody().strength(-200))
    .force('center', d3.forceCenter(W / 2, H / 2))
    .force('collision', d3.forceCollide(20))
    .on('tick', () => {
      link.attr('x1', d => d.source.x).attr('y1', d => d.source.y).attr('x2', d => d.target.x).attr('y2', d => d.target.y);
      node.attr('transform', d => `translate(${d.x},${d.y})`);
    });

  function dragStart(e, d) { if (!e.active) graphSimulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
  function dragged(e, d) { d.fx = e.x; d.fy = e.y; }
  function dragEnd(e, d) { if (!e.active) graphSimulation.alphaTarget(0); d.fx = null; d.fy = null; }
}

// ── Memory panel ─────────────────────────────────────────────────────────

function openMemory(mem) {
  // mem may be object or JSON string from onclick attribute
  if (typeof mem === 'string') mem = JSON.parse(mem.replace(/&quot;/g, '"'));
  activeMemoryId = mem.id;
  document.getElementById('memory-text').textContent = mem.text || mem.title;
  document.getElementById('memory-category').textContent = mem.category || 'general';
  document.getElementById('memory-date').textContent = mem.created_at ? formatDate(mem.created_at) : '';
  document.getElementById('memory-panel').style.display = 'flex';
  renderMemoryList(document.getElementById('search-input').value);
  // On mobile, open the sidebar
  const sidebar = document.getElementById('sidebar');
  if (!sidebar.classList.contains('open') && window.innerWidth <= 640) toggleSidebar();
}

function closeMemory() {
  activeMemoryId = null;
  document.getElementById('memory-panel').style.display = 'none';
  renderMemoryList(document.getElementById('search-input').value);
}

// ── Search ────────────────────────────────────────────────────────────────

let searchTimer;
function onSearch(q) {
  clearTimeout(searchTimer);
  if (sidebarTab === 'notes') {
    searchTimer = setTimeout(() => loadNotes(q), 300);
  } else {
    searchTimer = setTimeout(() => renderMemoryList(q), 150);
  }
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 's') { e.preventDefault(); saveNote(); }
  if ((e.metaKey || e.ctrlKey) && e.key === 'e') { e.preventDefault(); setView(currentView === 'edit' ? 'preview' : 'edit'); }
});

// ── Utils ─────────────────────────────────────────────────────────────────

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatDate(ts) {
  const d = new Date(ts * 1000), now = new Date();
  const diff = Math.floor((now - d) / 1000);
  if (diff < 60) return 'just now';
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return d.toLocaleDateString();
}
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.classList.toggle('open');
  // Backdrop
  let bd = document.getElementById('sidebar-backdrop');
  if (sidebar.classList.contains('open')) {
    if (!bd) {
      bd = document.createElement('div');
      bd.id = 'sidebar-backdrop';
      bd.style.cssText = 'position:fixed;inset:0;z-index:99;background:rgba(0,0,0,0.4);display:none';
      bd.onclick = toggleSidebar;
      document.body.appendChild(bd);
    }
    bd.style.display = 'block';
  } else if (bd) {
    bd.style.display = 'none';
  }
}

// ── File upload ───────────────────────────────────────────────────────────

async function uploadFile(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';
  await doUpload(file);
}

async function doUpload(file) {
  showToast(`Uploading ${file.name}...`);
  const fd = new FormData();
  fd.append('file', file);
  try {
    const res = await fetch('/api/upload', { method: 'POST', body: fd });
    const data = await res.json();
    if (data.error) { showToast(`Error: ${data.error}`, true); return; }
    showToast(`Created note "${data.title}"`);
    await loadNotes();
    await openNote(data.id);
  } catch (e) {
    showToast('Upload failed', true);
  }
}

function showToast(msg, error = false) {
  const t = document.getElementById('upload-toast');
  t.textContent = msg;
  t.style.display = 'block';
  t.style.borderColor = error ? 'var(--danger)' : 'var(--accent)';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.display = 'none'; }, 3000);
}

// ── Attach file/image into current note ──────────────────────────────────

async function attachFile(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';
  const fd = new FormData();
  fd.append('file', file);
  showToast(`Uploading ${file.name}...`);
  try {
    const res = await fetch('/api/attachments', { method: 'POST', body: fd });
    const data = await res.json();
    if (!res.ok) { showToast(`Error: ${data.error}`, true); return; }
    insertAttachment(data.url, data.filename, data.is_image);
    showToast(`Attached: ${data.filename}`);
  } catch (e) {
    showToast('Attach failed', true);
  }
}

function insertAttachment(url, filename, isImage) {
  const editor = document.getElementById('editor');
  editor.focus();
  const sel = window.getSelection();
  let range = sel.rangeCount ? sel.getRangeAt(0) : null;
  if (!range || !editor.contains(range.commonAncestorContainer)) {
    range = document.createRange();
    range.selectNodeContents(editor);
    range.collapse(false);
  }
  range.deleteContents();
  if (isImage) {
    const img = document.createElement('img');
    img.src = url;
    img.alt = filename;
    img.setAttribute('data-md', `![${filename}](${url})`);
    img.className = 'editor-img';
    const br1 = document.createElement('br');
    const br2 = document.createElement('br');
    range.insertNode(br2);
    range.insertNode(img);
    range.insertNode(br1);
    range.setStartAfter(br2);
    range.collapse(true);
  } else {
    const text = document.createTextNode(`[${filename}](${url})`);
    range.insertNode(text);
    range.setStartAfter(text);
    range.collapse(true);
  }
  sel.removeAllRanges();
  sel.addRange(range);
  markDirty();
}

// Paste handler for editor (contenteditable)
document.addEventListener('paste', async e => {
  const editor = document.getElementById('editor');
  if (!editor.contains(document.activeElement) && document.activeElement !== editor) return;
  const items = e.clipboardData?.items;
  if (!items) return;
  // Image paste → upload and insert inline
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const file = item.getAsFile();
      const fd = new FormData();
      fd.append('file', file, `paste-${Date.now()}.png`);
      showToast('Uploading pasted image...');
      try {
        const res = await fetch('/api/attachments', { method: 'POST', body: fd });
        const data = await res.json();
        if (res.ok) { insertAttachment(data.url, data.filename, true); showToast('Image pasted'); }
        else showToast(`Error: ${data.error}`, true);
      } catch (err) { showToast('Paste failed', true); }
      return;
    }
  }
  // Plain text paste — strip HTML formatting
  const text = e.clipboardData.getData('text/plain');
  if (text) {
    e.preventDefault();
    document.execCommand('insertText', false, text);
  }
});

// ── Uploads page ──────────────────────────────────────────────────────────

async function handleSmartUpload(file, resultEl) {
  const ext = file.name.split('.').pop().toLowerCase();
  const imageExts = ['png','jpg','jpeg','gif','webp','svg','bmp'];
  const zipExt = 'zip';

  if (ext === zipExt) {
    resultEl.textContent = `Importing ${file.name}…`;
    const fd = new FormData();
    fd.append('file', file);
    const res = await fetch('/api/upload-zip', { method: 'POST', body: fd });
    const data = await res.json();
    if (data.error) { resultEl.textContent = `Error: ${data.error}`; return; }
    resultEl.innerHTML = `<strong>${data.count} note${data.count !== 1 ? 's' : ''} created from zip</strong>` +
      (data.skipped.length ? ` · ${data.skipped.length} skipped` : '');
    await loadNotes();
  } else if (imageExts.includes(ext)) {
    resultEl.textContent = `Uploading ${file.name}…`;
    const fd = new FormData();
    fd.append('file', file);
    const res = await fetch('/api/attachments', { method: 'POST', body: fd });
    const data = await res.json();
    if (!res.ok) { resultEl.textContent = `Error: ${data.error}`; return; }
    resultEl.textContent = `Saved: ${data.filename}`;
    loadUploadsGallery();
  } else {
    resultEl.textContent = `Uploading ${file.name}…`;
    const fd = new FormData();
    fd.append('file', file);
    const res = await fetch('/api/upload', { method: 'POST', body: fd });
    const data = await res.json();
    if (data.error) { resultEl.textContent = `Error: ${data.error}`; return; }
    resultEl.innerHTML = `Note created: <span style="color:var(--accent2);cursor:pointer" onclick="openNote(${data.id})">${esc(data.title)}</span>`;
    await loadNotes();
    await openNote(data.id);
  }
}

async function handleUploadsDrop(e) {
  e.preventDefault();
  document.getElementById('uploads-drop-zone').classList.remove('over');
  const resultEl = document.getElementById('uploads-result');
  const files = Array.from(e.dataTransfer.files);
  for (const file of files) await handleSmartUpload(file, resultEl);
}

async function handleUploadsFileSelect(input) {
  const resultEl = document.getElementById('uploads-result');
  const files = Array.from(input.files);
  input.value = '';

async function loadUploadsGallery() {
  try {
    const res = await fetch('/api/attachments');
    const files = await res.json();
    const section = document.getElementById('uploads-files-section');
    const gallery = document.getElementById('uploads-gallery');
    if (!files.length) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    gallery.innerHTML = files.map(f => {
      if (f.is_image) {
        return `<div class="upload-thumb" title="${esc(f.original)}" onclick="window.open('${f.url}','_blank')">
          <img src="${f.url}" alt="${esc(f.original)}" loading="lazy">
          <div class="thumb-name">${esc(f.original)}</div>
        </div>`;
      } else {
        const size = f.size < 1024 ? f.size + 'B' : f.size < 1048576 ? (f.size/1024).toFixed(1)+'KB' : (f.size/1048576).toFixed(1)+'MB';
        return `<div class="upload-file" title="${esc(f.original)}" onclick="window.open('${f.url}','_blank')">
          <span class="file-icon">📄</span>
          <div class="file-info"><div class="file-name">${esc(f.original)}</div><div class="file-size">${size}</div></div>
        </div>`;
      }
    }).join('');
  } catch(e) {}
}

function exportNote() {
  if (!activeNote) return;
  const title = document.getElementById('note-title-input').value || activeNote.title || 'note';
  const content = getContent();
  const blob = new Blob([content], { type: 'text/markdown' });
  const a = document.createElement('a');

  a.href = URL.createObjectURL(blob);
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── Command palette ───────────────────────────────────────────────────────

let cmdSelectedIdx = 0;
function openCmdPalette() {
  document.getElementById('cmd-palette').classList.add('open');
  document.getElementById('cmd-input').value = '';
  cmdFilter('');
  document.getElementById('cmd-input').focus();
}
function closeCmdPalette() {
  document.getElementById('cmd-palette').classList.remove('open');
}
function cmdFilter(q) {
  const filtered = q.trim()
    ? notes.filter(n => n.title.toLowerCase().includes(q.toLowerCase()) || (n.preview || '').toLowerCase().includes(q.toLowerCase()))
    : notes.slice(0, 8);
  cmdSelectedIdx = 0;
  const el = document.getElementById('cmd-results');
  el.innerHTML = filtered.map((n, i) => `
    <div class="cmd-item ${i === 0 ? 'selected' : ''}" onclick="openNote(${n.id});closeCmdPalette()">
      <span class="cmd-title">${esc(n.title)}</span>
      ${n.preview ? `<span class="cmd-preview">${esc(n.preview)}</span>` : ''}
    </div>
  `).join('');
  el._filtered = filtered;
}
document.addEventListener('keydown', e => {
  const palette = document.getElementById('cmd-palette');
  if (palette.classList.contains('open')) {
    if (e.key === 'Escape') { closeCmdPalette(); return; }
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
      e.preventDefault();
      const items = document.querySelectorAll('.cmd-item');
      if (!items.length) return;
      items[cmdSelectedIdx]?.classList.remove('selected');
      cmdSelectedIdx = e.key === 'ArrowDown'
        ? Math.min(cmdSelectedIdx + 1, items.length - 1)
        : Math.max(cmdSelectedIdx - 1, 0);
      items[cmdSelectedIdx]?.classList.add('selected');
      items[cmdSelectedIdx]?.scrollIntoView({ block: 'nearest' });
    }
    if (e.key === 'Enter') {
      const filtered = document.getElementById('cmd-results')._filtered;
      if (filtered?.[cmdSelectedIdx]) { openNote(filtered[cmdSelectedIdx].id); closeCmdPalette(); }
    }
    return;
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openCmdPalette(); return; }
  if (e.key === 'f' && !e.metaKey && !e.ctrlKey && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
    toggleFocus();
  }
  if (e.key === 'Escape' && focusActive) toggleFocus();
});
document.getElementById('cmd-palette').addEventListener('click', e => {
  if (e.target === document.getElementById('cmd-palette')) closeCmdPalette();
});

// ── Format bar actions ────────────────────────────────────────────────────

function fmtGetSel() {
  const sel = window.getSelection();
  if (!sel.rangeCount) return { sel, range: null, text: '' };
  const range = sel.getRangeAt(0);
  const text = range.toString();
  return { sel, range, text };
}

function fmtWrap(before, after) {
  const { sel, range, text } = fmtGetSel();
  if (!range) return;

  // Toggle: if selection is already wrapped, unwrap it
  if (text.startsWith(before) && text.endsWith(after) && text.length > before.length + after.length) {
    const inner = text.slice(before.length, text.length - after.length);
    const node = document.createTextNode(inner);
    range.deleteContents();
    range.insertNode(node);
    const r = document.createRange();
    r.selectNodeContents(node);
    sel.removeAllRanges();
    sel.addRange(r);
  } else {
    const inner = text || 'text';
    const node = document.createTextNode(before + inner + after);
    range.deleteContents();
    range.insertNode(node);
    const r = document.createRange();
    r.setStart(node, before.length);
    r.setEnd(node, before.length + inner.length);
    sel.removeAllRanges();
    sel.addRange(r);
  }
  markDirty();
  updateFmtBar();
}

const FMT_MARKERS = [
  { fmt: 'bold',   before: '**', after: '**' },
  { fmt: 'italic', before: '*',  after: '*'  },
  { fmt: 'strike', before: '~~', after: '~~' },
  { fmt: 'code',   before: '`',  after: '`'  },
];

function updateFmtBar() {
  const sel = window.getSelection();
  if (!sel || !sel.rangeCount) return;
  const text = sel.getRangeAt(0).toString();
  for (const { fmt, before, after } of FMT_MARKERS) {
    const btn = document.querySelector(`.fmt-btn[data-fmt="${fmt}"]`);
    if (!btn) continue;
    const active = text.length > before.length + after.length &&
                   text.startsWith(before) && text.endsWith(after);
    btn.classList.toggle('active', active);
  }
}

document.addEventListener('selectionchange', () => {
  const editor = document.getElementById('editor');
  const active = document.activeElement;
  if (active === editor || editor.contains(active)) updateFmtBar();
});

function fmtLine(prefix) {
  document.execCommand('insertText', false, '\n' + prefix);
  markDirty();
}

function fmtInsert(text) {
  document.execCommand('insertText', false, text);

}

function buildInteractiveTable(cols, dataRows) {
  const cellStyle = 'border:1px solid var(--border);padding:6px 10px;min-width:60px;';
  const ctrlStyle = 'border:none;padding:2px;background:transparent;width:26px;vertical-align:middle;text-align:center;';

  const table = document.createElement('table');
  table.className = 'fmt-table';

  // Header row — each header has a float-right − button to remove that column
  const thead = document.createElement('thead');
  const headerRow = document.createElement('tr');
  for (let c = 0; c < cols; c++) {
    headerRow.appendChild(_makeTblHeader(`Header ${c + 1}`, c, cellStyle));
  }
  // Spacer header cell to align with row-remove buttons
  const thSpacer = document.createElement('th');
  thSpacer.className = 'tbl-ctrl-cell';
  thSpacer.contentEditable = 'false';
  thSpacer.style.cssText = ctrlStyle;
  headerRow.appendChild(thSpacer);
  thead.appendChild(headerRow);
  table.appendChild(thead);

  // Body: data rows + one control row at the bottom
  const tbody = document.createElement('tbody');
  for (let r = 0; r < dataRows; r++) {
    tbody.appendChild(_makeTblDataRow(cols, cellStyle, ctrlStyle));
  }

  // Control row: colspan spans data cols, corner has + add-row, nothing else
  const ctrlRow = document.createElement('tr');
  ctrlRow.className = 'tbl-ctrl-row';
  ctrlRow.contentEditable = 'false';
  const tdSpan = document.createElement('td');
  tdSpan.className = 'tbl-ctrl-cell';
  tdSpan.contentEditable = 'false';
  tdSpan.colSpan = cols;
  tdSpan.style.cssText = 'border:none;padding:4px 2px;background:transparent;';
  tdSpan.innerHTML = `<button class="tbl-btn tbl-add-row-btn" onclick="addTblRow(this.closest('table'))" title="Add row" style="width:auto;padding:2px 8px;font-size:11px;">+ Row</button>  <button class="tbl-btn tbl-add-row-btn" onclick="addTblCol(this.closest('table'))" title="Add column" style="width:auto;padding:2px 8px;font-size:11px;">+ Col</button>`;
  ctrlRow.appendChild(tdSpan);
  // Empty corner to align
  const tdCorner = document.createElement('td');
  tdCorner.className = 'tbl-ctrl-cell';
  tdCorner.contentEditable = 'false';
  tdCorner.style.cssText = ctrlStyle;
  ctrlRow.appendChild(tdCorner);
  tbody.appendChild(ctrlRow);
  table.appendChild(tbody);
  return table;
}

function _makeTblHeader(label, colIdx, cellStyle) {
  const cs = cellStyle || 'border:1px solid var(--border);padding:6px 10px;min-width:60px;';
  const th = document.createElement('th');
  th.contentEditable = 'true';
  th.style.cssText = cs + 'background:var(--surface);text-align:left;';
  // Float-right − button (contenteditable=false so it doesn't get typed into)
  const btn = document.createElement('button');
  btn.className = 'tbl-btn tbl-rm-btn tbl-rm-col-btn';
  btn.contentEditable = 'false';
  btn.title = 'Remove column';
  btn.textContent = '−';
  btn.setAttribute('onclick', `rmTblCol(this.closest('table'),${colIdx})`);
  th.appendChild(btn);
  th.appendChild(document.createTextNode(label));
  return th;
}

function _makeTblDataRow(cols, cellStyle, ctrlStyle) {
  const cs = cellStyle || 'border:1px solid var(--border);padding:6px 10px;min-width:60px;';
  const ctrl = ctrlStyle || 'border:none;padding:2px;background:transparent;width:26px;vertical-align:middle;text-align:center;';
  const tr = document.createElement('tr');
  for (let c = 0; c < cols; c++) {
    const td = document.createElement('td');
    td.contentEditable = 'true';
    td.textContent = 'Cell';
    td.style.cssText = cs;
    tr.appendChild(td);
  }
  const tdCtrl = document.createElement('td');
  tdCtrl.className = 'tbl-ctrl-cell';
  tdCtrl.contentEditable = 'false';
  tdCtrl.style.cssText = ctrl;
  tdCtrl.innerHTML = `<button class="tbl-btn tbl-rm-btn" onclick="rmTblRow(this)" title="Remove row">−</button>`;
  tr.appendChild(tdCtrl);
  return tr;
}

function addTblRow(table) {
  const ctrlRow = table.querySelector('.tbl-ctrl-row');
  const cols = table.querySelectorAll('thead tr th:not(.tbl-ctrl-cell)').length;
  table.querySelector('tbody').insertBefore(_makeTblDataRow(cols), ctrlRow);
  markDirty();
}

function rmTblRow(btn) {
  const row = btn.closest('tr');
  const dataRows = row.closest('tbody').querySelectorAll('tr:not(.tbl-ctrl-row)');
  if (dataRows.length <= 1) { showToast('Need at least one row'); return; }
  row.remove();
  markDirty();
}

function addTblCol(table) {
  const cols = table.querySelectorAll('thead tr th:not(.tbl-ctrl-cell)').length;
  // Add header cell with − button
  const headerRow = table.querySelector('thead tr');
  headerRow.insertBefore(_makeTblHeader(`Header ${cols + 1}`, cols, 'border:1px solid var(--border);padding:6px 10px;min-width:60px;'), headerRow.querySelector('.tbl-ctrl-cell'));
  // Add data cells to each data row
  table.querySelectorAll('tbody tr:not(.tbl-ctrl-row)').forEach(row => {
    const td = document.createElement('td');
    td.contentEditable = 'true';
    td.textContent = 'Cell';
    td.style.cssText = 'border:1px solid var(--border);padding:6px 10px;min-width:60px;';
    row.insertBefore(td, row.querySelector('.tbl-ctrl-cell'));
  });
  // Update colspan on ctrl row span cell
  const spanCell = table.querySelector('.tbl-ctrl-row .tbl-ctrl-cell[colspan]');
  if (spanCell) spanCell.colSpan = cols + 1;
  updateTblColBtns(table);
  markDirty();
}

function rmTblCol(table, colIdx) {
  const headers = table.querySelectorAll('thead tr th:not(.tbl-ctrl-cell)');
  if (headers.length <= 1) { showToast('Need at least one column'); return; }
  headers[colIdx]?.remove();
  table.querySelectorAll('tbody tr:not(.tbl-ctrl-row)').forEach(row => {
    row.querySelectorAll('td:not(.tbl-ctrl-cell)')[colIdx]?.remove();
  });
  const spanCell = table.querySelector('.tbl-ctrl-row .tbl-ctrl-cell[colspan]');
  if (spanCell) spanCell.colSpan = Math.max(1, (spanCell.colSpan || 1) - 1);
  updateTblColBtns(table);
  markDirty();
}

function updateTblColBtns(table) {
  table.querySelectorAll('thead tr th:not(.tbl-ctrl-cell)').forEach((th, i) => {
    const btn = th.querySelector('.tbl-rm-col-btn');
    if (btn) btn.setAttribute('onclick', `rmTblCol(this.closest('table'),${i})`);
  });
}

function fmtInsertTable() {
  // Auto-switch to Live mode so the table is immediately visible
  if (!livePreviewActive) toggleLivePreview();

  const table = buildInteractiveTable(3, 2);
  const preview = document.getElementById('preview');
  preview.focus();
  const sel = window.getSelection();
  let range = sel.rangeCount ? sel.getRangeAt(0) : null;
  if (!range || !preview.contains(range.commonAncestorContainer)) {
    range = document.createRange();
    range.selectNodeContents(preview);
    range.collapse(false);
  }
  range.collapse(false);
  const br = document.createElement('br');
  range.insertNode(br);
  range.insertNode(table);
  range.setStartAfter(br);
  range.collapse(true);
  sel.removeAllRanges();
  sel.addRange(range);
  markDirty();
}

function fmtInsertCodeBlock() {
  fmtInsert('\n```\n\n```\n');
}

function fmtInsertLink() {
  const { range, text } = fmtGetSel();
  if (!range) return;
  const url = prompt('URL:');
  if (!url) return;
  const label = text || 'link text';

// ── Live preview toggle ───────────────────────────────────────────────────

function richHtmlToMd(el) {
  let md = '';
  function walk(node) {
    if (node.nodeType === 3) { md += node.textContent; return; }
    const tag = node.tagName?.toLowerCase();
    const ch = () => { for (const c of node.childNodes) walk(c); };
    switch (tag) {
      case 'strong': case 'b': md += '**'; ch(); md += '**'; break;
      case 'em':     case 'i': md += '*';  ch(); md += '*';  break;
      case 'del':    case 's': md += '~~'; ch(); md += '~~'; break;
      case 'code':
        if (node.closest('pre')) ch();
        else { md += '`'; ch(); md += '`'; }
        break;
      case 'pre': md += '\n```\n'; ch(); md += '\n```\n'; break;
      case 'h1': md += '\n# ';   ch(); md += '\n'; break;
      case 'h2': md += '\n## ';  ch(); md += '\n'; break;
      case 'h3': md += '\n### '; ch(); md += '\n'; break;
      case 'h4': md += '\n#### ';ch(); md += '\n'; break;
      case 'p':  if (md && !md.endsWith('\n')) md += '\n'; ch(); md += '\n'; break;
      case 'li': {
        const ordered = node.parentElement?.tagName.toLowerCase() === 'ol';
        const idx = ordered ? (Array.from(node.parentElement.children).indexOf(node) + 1) + '. ' : '- ';
        const checkbox = node.querySelector('input[type="checkbox"]');
        const prefix = checkbox ? (checkbox.checked ? '- [x] ' : '- [ ] ') : idx;
        md += '\n' + prefix; ch(); break;
      }
      case 'ul': case 'ol': ch(); md += '\n'; break;
      case 'blockquote': md += '\n> '; ch(); break;
      case 'br': md += '\n'; break;
      case 'hr': md += '\n---\n'; break;
      case 'a':  md += `[${node.innerText}](${node.getAttribute('href') || ''})`; break;
      case 'img': md += node.getAttribute('data-md') || `![${node.alt||''}](${node.src||''})`; break;
      case 'table': {
        const dataRows = Array.from(node.querySelectorAll('tr')).filter(r => !r.classList.contains('tbl-ctrl-row'));
        dataRows.forEach((row, ri) => {
          const cells = Array.from(row.querySelectorAll('th,td'))
            .filter(c => !c.classList.contains('tbl-ctrl-cell'))
            .map(c => {
              const clone = c.cloneNode(true);
              clone.querySelectorAll('.tbl-rm-col-btn').forEach(b => b.remove());
              return clone.textContent.trim().replace(/\|/g, '\\|');
            });
          if (!cells.length) return;
          md += '\n| ' + cells.join(' | ') + ' |';
          if (ri === 0) md += '\n| ' + cells.map(() => '---').join(' | ') + ' |';
        });
        md += '\n'; break;
      }
      default: ch(); break;
    }
  }
  for (const c of el.childNodes) walk(c);
  return md.replace(/^\n+/, '').replace(/\n{3,}/g, '\n\n').trim();
}

function toggleLivePreview() {
  const btn = document.getElementById('fmt-live-btn');
  const area = document.getElementById('content-area');
  const editor = document.getElementById('editor');
  const preview = document.getElementById('preview');

  if (!livePreviewActive) {
    // Capture raw markdown NOW, before any display changes
    const rawMd = htmlToMd(editor);
    livePreviewActive = true;
    btn.classList.add('active');
    // Render into preview from the captured markdown
    const processed = rawMd.replace(/\[\[([^\]]+)\]\]/g, (_, title) => {
      const note = notes.find(n => n.title.toLowerCase() === title.toLowerCase());
      return note
        ? `<a class="wikilink" href="#${note.id}" onclick="openNote(${note.id});return false;">${title}</a>`
        : `<span style="color:var(--danger)">[[${title}]]</span>`;
    });
    preview.innerHTML = marked.parse(processed);
    preview.contentEditable = 'true';
    preview.style.display = 'block';
    preview.style.outline = 'none';
    editor.style.display = 'none';
    area.classList.remove('split');
    preview.focus();
    preview.addEventListener('input', onLivePreviewInput);
  } else {
    // Sync back: convert preview HTML → markdown → update raw editor
    const md = richHtmlToMd(preview);
    livePreviewActive = false;
    btn.classList.remove('active');
    preview.contentEditable = 'false';
    preview.removeEventListener('input', onLivePreviewInput);
    preview.style.display = 'none';
    editor.style.display = 'block';
    setContent(md);
    markDirty();
  }
}

function onLivePreviewInput() {
  markDirty();
}

// Prevent format bar buttons from stealing focus / clearing editor selection
document.getElementById('format-bar').addEventListener('mousedown', e => {
  if (e.target.closest('.fmt-btn')) e.preventDefault();
});

// Wire up live preview re-render on editor keystrokes (raw mode only)
document.getElementById('editor').addEventListener('input', () => {
  if (livePreviewActive) renderPreview();
});

// Cmd+B / Cmd+I shortcuts in editor
document.getElementById('editor').addEventListener('keydown', e => {
  if (e.metaKey || e.ctrlKey) {
    if (e.key === 'b') { e.preventDefault(); fmtWrap('**', '**'); }
    if (e.key === 'i') { e.preventDefault(); fmtWrap('*', '*'); }
  }
});

fetch('/api/server-info').then(r => r.json()).then(d => {
  renderWifiFooter(d.wifi_enabled, d.lan_ip, d.port || 8766);
}).catch(() => {});

init();
</script>
